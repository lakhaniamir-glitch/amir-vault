agent: beta-design
focus: 'New and updated AI tools across image generation, video generation, agents,
  automation, marketing and ad creative, ecommerce AI, voice and audio. Mandate
  is AI tools scout, not design trends. Find tools that replace, compress, or
  speed up an Aydins workflow, or that materially shift cost (model price drops,
  capability jumps).

  '
business_context: 'Aydins Jewelry uses AI heavily across the stack. Image gen via
  Gemini 2.5 Flash Image (nano-banana) for product hero shots, reference image
  rule locked 2026-06-04. Video via CapCut for reels. Agentic loops on a Hetzner
  VPS, beta orchestrator plus channel specialists (beta-shop, beta-meta, beta-google,
  beta-insta, beta-tiktok, beta-klaviyo, beta-etsy, beta-ebay, beta-design).
  OpenRouter to DeepSeek v3.2 backend for cheap synthesis. Anthropic Claude for
  high-end reasoning. Replicate occasionally. Arcads for UGC video. The goal is
  to catch new tools or model releases or price cuts that beat current setup
  within 7 days of release.

  '
